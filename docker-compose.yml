services:
  sentinel:
    build: .
    container_name: sentinel
    restart: unless-stopped
    ports:
      - "${SENTINEL_PORT:-9200}:9200"
    volumes:
      - sentinel-data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "/sentinel", "-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  sentinel-data:
