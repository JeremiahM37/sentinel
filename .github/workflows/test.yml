name: Build & Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version-file: go.mod, cache: false}
      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi
      - run: go vet ./...
      - run: go build -o sentinel ./cmd/sentinel/
      - run: go test ./... -v -count=1
